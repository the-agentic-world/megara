<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sisyphus banner</title>
  <desc id="desc">A local issue-to-agent broker that converts GitHub and GitLab issues into Codex-ready work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.46" stop-color="#17252f"/>
      <stop offset="1" stop-color="#223126"/>
    </linearGradient>
    <linearGradient id="accent" x1="210" y1="72" x2="1028" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#82D7D0"/>
      <stop offset="0.52" stop-color="#E7D46B"/>
      <stop offset="1" stop-color="#F28F6B"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
