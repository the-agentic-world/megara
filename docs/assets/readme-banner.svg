    <text x="154" y="132" fill="#DDF7F3" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="700">Issue Providers</text>
    <rect x="154" y="166" width="188" height="44" rx="10" fill="#19353D" stroke="#5EC7BC" stroke-opacity="0.55"/>
    <text x="178" y="195" fill="#F7F3E7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="650">GitHub</text>
