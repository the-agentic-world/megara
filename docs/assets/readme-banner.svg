    <text x="994" y="208" fill="#F7F3E7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="750">Codex</text>
    <text x="940" y="271" fill="#D5CFC2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="600">native sessions stay native</text>
