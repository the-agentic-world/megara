name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.0.4"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  CARGO_HTTP_MULTIPLEXING: false
  BIN_NAME: sisyphus

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Validate tag matches Cargo version
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import tomllib

          with open("Cargo.toml", "rb") as cargo_toml:
              cargo_version = tomllib.load(cargo_toml)["package"]["version"]

          release_tag = os.environ["RELEASE_TAG"]
          expected_tag = f"v{cargo_version}"
          if release_tag != expected_tag:
              raise SystemExit(f"release tag {release_tag} does not match Cargo.toml version {cargo_version}; expected {expected_tag}")
          PY

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package archive
        shell: bash
        run: |
          archive="${BIN_NAME}-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          mkdir -p "dist/package" "dist/checksums"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/package/${BIN_NAME}"
          tar -C "dist/package" -czf "dist/${archive}" "${BIN_NAME}"
          shasum -a 256 "dist/${archive}" | tee "dist/${archive}.sha256"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t assets < <(find dist -type f \( -name "*.tar.gz" -o -name "*.sha256" \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          notes="Sisyphus ${version}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" --title "${RELEASE_TAG}" --notes "${notes}"
          fi

  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs:
      - github-release
    if: vars.HOMEBREW_TAP_REPO != ''
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          path: source

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate Formula
        shell: bash
        run: |
          mkdir -p homebrew-tap/Formula
          bash source/scripts/generate-homebrew-formula.sh \
            "${RELEASE_TAG#v}" \
            "${GITHUB_REPOSITORY}" \
            "dist" \
            "homebrew-tap/Formula/sisyphus.rb"

      - name: Commit Formula update
        shell: bash
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/sisyphus.rb
          if git diff --cached --quiet; then
            echo "Homebrew Formula already up to date"
            exit 0
          fi
          git commit -m "sisyphus ${RELEASE_TAG}"
          git push
