name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify release readiness
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          test -n "$version"
          test "${GITHUB_REF_NAME}" = "v${version}"
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --locked
      - run: sh -n install.sh

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: verify
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Smoke binary
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/megara"
          "$bin" --version
          "$bin" targets list | grep -qx codex
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="megara-v${version}-${{ matrix.target }}.tar.gz"
          mkdir -p "dist/megara-v${version}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/megara" "dist/megara-v${version}-${{ matrix.target }}/"
          tar -C "dist/megara-v${version}-${{ matrix.target }}" -czf "${archive}" "megara"
          shasum -a 256 "${archive}" > "${archive}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: megara-${{ matrix.target }}
          path: |
            megara-v*.tar.gz
            megara-v*.tar.gz.sha256

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Verify release assets before publish
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          targets=(
            "aarch64-apple-darwin"
            "x86_64-apple-darwin"
          )
          for target in "${targets[@]}"; do
            archive="megara-v${version}-${target}.tar.gz"
            test -s "dist/${archive}"
            test -s "dist/${archive}.sha256"
            (cd dist && shasum -a 256 -c "${archive}.sha256")
            tar -tzf "dist/${archive}" | grep -qx "megara"
          done
          cp install.sh dist/install.sh
      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/megara-v*.tar.gz
            dist/megara-v*.tar.gz.sha256
            dist/install.sh

  smoke-install:
    name: Smoke install (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: publish
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    steps:
      - name: Install from published release script
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/install.sh" -o "${RUNNER_TEMP}/install.sh"
          MEGARA_VERSION="${GITHUB_REF_NAME}" MEGARA_INSTALL_DIR="${RUNNER_TEMP}/bin" sh "${RUNNER_TEMP}/install.sh"
          "${RUNNER_TEMP}/bin/megara" --version
          "${RUNNER_TEMP}/bin/megara" targets list | grep -qx codex

  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: smoke-install
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: the-agentic-world/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Update formula
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          repo="${GITHUB_REPOSITORY}"
          arm_archive="megara-v${version}-aarch64-apple-darwin.tar.gz"
          intel_archive="megara-v${version}-x86_64-apple-darwin.tar.gz"
          arm_sha="$(cut -d ' ' -f 1 "dist/${arm_archive}.sha256")"
          intel_sha="$(cut -d ' ' -f 1 "dist/${intel_archive}.sha256")"
          mkdir -p tap/Formula
          cat > tap/Formula/megara.rb <<RUBY
          class Megara < Formula
            desc "Project and global agent harness installer"
            homepage "https://github.com/${repo}"
            version "${version}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${repo}/releases/download/v${version}/${arm_archive}"
                sha256 "${arm_sha}"
              else
                url "https://github.com/${repo}/releases/download/v${version}/${intel_archive}"
                sha256 "${intel_sha}"
              end
            end

            def install
              bin.install "megara"
            end

            test do
              assert_match "codex", shell_output("#{bin}/megara targets list")
            end
          end
          RUBY
      - name: Commit formula
        shell: bash
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/megara.rb
          git commit -m "megara ${GITHUB_REF_NAME}" || exit 0
          git push
